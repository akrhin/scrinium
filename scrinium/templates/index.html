<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrinium</title>
<style>
/* ── Reset & Base ──────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e; --bg2:#16213e; --bg3:#0f3460;
  --surface:#1e2749; --surface2:#253158;
  --accent:#4facfe; --accent2:#00f2fe;
  --text:#e0e0e0; --text2:#a0a0b0; --text3:#606080;
  --danger:#ff4757; --success:#2ed573;
  --radius:10px; --shadow:0 4px 24px rgba(0,0,0,0.3);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:inherit;border:none;border-radius:var(--radius);padding:10px 20px;font-size:14px;transition:.2s}
input,textarea{font-family:inherit;background:var(--surface);border:1px solid var(--surface2);color:var(--text);border-radius:var(--radius);padding:10px 14px;font-size:14px;width:100%;outline:none;transition:.2s}
input:focus,textarea:focus{border-color:var(--accent)}
::placeholder{color:var(--text3)}

/* ── Login ──────────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:var(--bg)}
#login-screen.hidden{display:none}
.login-box{background:var(--surface);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.login-box h1{text-align:center;margin-bottom:8px;font-size:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box p{text-align:center;color:var(--text2);margin-bottom:24px;font-size:14px}
.login-box .form-group{margin-bottom:16px}
.login-box .btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:600;padding:12px;font-size:16px}
.login-box .btn-primary:hover{opacity:.9}
.login-error{color:var(--danger);font-size:13px;margin-top:8px;text-align:center;display:none}

/* ── Layout ─────────────────────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
#app.hidden{display:none}

/* Sidebar */
#sidebar{width:300px;min-width:300px;background:var(--surface);display:flex;flex-direction:column;border-right:1px solid var(--surface2);overflow:hidden;z-index:50}
#sidebar-overlay{display:none;position:fixed;inset:0;z-index:40;background:rgba(0,0,0,0.4)}
#sidebar-overlay.visible{display:block}
.sidebar-header{padding:16px;border-bottom:1px solid var(--surface2);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-header .user-badge{font-size:12px;color:var(--text2);background:var(--surface2);padding:4px 10px;border-radius:20px}

.sidebar-section{padding:8px 12px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);display:flex;align-items:center;justify-content:space-between;padding-top:16px}
.sidebar-section button{background:none;color:var(--accent);padding:2px 6px;font-size:11px}

.sidebar-list{flex:1;overflow-y:auto;padding:0 8px}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}

.sidebar-item{padding:10px 12px;border-radius:8px;margin:2px 0;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s;overflow:hidden}
.sidebar-item:hover{background:var(--surface2)}
.sidebar-item.active{background:var(--bg3)}
.sidebar-item .icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sidebar-item .icon.doc{background:linear-gradient(135deg,#667eea,#764ba2)}
.sidebar-item .icon.chat{background:linear-gradient(135deg,#f093fb,#f5576c)}
.sidebar-item .info{flex:1;min-width:0}
.sidebar-item .info .title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-item .info .sub{font-size:11px;color:var(--text3)}
.sidebar-item .del{opacity:0;background:none;color:var(--text3);padding:2px 4px;font-size:12px}
.sidebar-item:hover .del{opacity:1}
.sidebar-item .del:hover{color:var(--danger)}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#chat-header{padding:14px 24px;border-bottom:1px solid var(--surface2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
#chat-header .title{font-size:15px;font-weight:600}
#chat-header .actions{display:flex;gap:8px}
#chat-header .actions button{background:var(--surface);color:var(--text2);padding:6px 14px;font-size:12px}
#chat-header .actions button:hover{background:var(--surface2);color:var(--text)}

#chat-messages{flex:1;overflow-y:auto;padding:20px 24px}
#chat-messages::-webkit-scrollbar{width:6px}
#chat-messages::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

.message{margin-bottom:20px;max-width:85%;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}}
.message.user{margin-left:auto}
.message.assistant{margin-right:auto}
.message .bubble{background:var(--surface);border-radius:16px;padding:14px 18px;line-height:1.6;font-size:14px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.message.user .bubble{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:4px}
.message.assistant .bubble{background:var(--surface2);border-bottom-left-radius:4px}
.message .bubble .label{font-size:11px;color:var(--text3);margin-bottom:4px}

.message .sources{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.message .sources .tag{font-size:11px;background:var(--surface);color:var(--text2);padding:3px 10px;border-radius:12px;border:1px solid var(--surface2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);text-align:center;padding:40px}
.empty-state .emoji{font-size:48px;margin-bottom:16px}
.empty-state p{font-size:14px}
.empty-state .sub{font-size:12px;color:var(--text3);margin-top:4px}

/* Input */
#chat-input-area{padding:16px 24px;border-top:1px solid var(--surface2);background:var(--surface)}
#chat-form{display:flex;gap:10px;align-items:flex-end}
#chat-input{flex:1;resize:none;min-height:48px;max-height:120px;padding:14px 16px;background:var(--surface2);border-color:transparent}
#chat-input:focus{border-color:var(--accent);background:var(--bg2)}
#chat-send{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;padding:0}
#chat-send:hover{opacity:.9}
#chat-send:disabled{opacity:.4;cursor:not-allowed}

/* Upload */
#upload-area{display:none;padding:24px;border-bottom:1px solid var(--surface2);background:var(--surface)}
#upload-area.visible{display:block}
.upload-zone{border:2px dashed var(--surface2);border-radius:var(--radius);padding:30px;text-align:center;transition:.2s;cursor:pointer}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--bg3)}
.upload-zone .icon{font-size:32px;margin-bottom:8px}
.upload-zone .text{font-size:13px;color:var(--text2)}
.upload-zone .hint{font-size:11px;color:var(--text3);margin-top:4px}
.upload-progress{display:none;margin-top:12px}
.upload-progress.visible{display:block}
.upload-progress .file{font-size:13px;margin-bottom:4px}
.upload-progress .bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.upload-progress .bar div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .3s}
.upload-progress .status{font-size:12px;color:var(--text3);margin-top:4px}

/* Settings */
#settings-panel{display:none;padding:24px;border-bottom:1px solid var(--surface2);background:var(--surface)}
#settings-panel.visible{display:block}
#settings-panel h3{margin-bottom:12px;font-size:14px}
.settings-row{margin-bottom:12px;display:flex;flex-direction:column;gap:4px}
.settings-row label{font-size:12px;color:var(--text2)}
.settings-row input{font-size:13px;padding:8px 12px}
.settings-actions{display:flex;gap:8px;margin-top:8px}
.settings-actions button{font-size:12px;padding:8px 16px}
.btn-secondary{background:var(--surface2);color:var(--text)}
.btn-secondary:hover{background:var(--bg3)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.85}

/* Hamburger */
#menu-btn{display:none;background:none;color:var(--text2);padding:6px;font-size:20px;margin-right:8px}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);padding:12px 24px;border-radius:12px;font-size:13px;box-shadow:var(--shadow);z-index:200;display:none;animation:fadeIn .2s;white-space:nowrap}
#toast.error{background:var(--danger);color:#fff}
#toast.success{background:var(--success);color:#fff}

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:768px){
  #sidebar{position:fixed;left:-300px;top:0;bottom:0;z-index:50;transition:left .25s;width:280px;min-width:280px}
  #sidebar.open{left:0}
  #menu-btn{display:inline-flex}
  #chat-messages{padding:16px}
  #chat-input-area{padding:12px 16px}
  .message{max-width:95%}
  #toast{white-space:normal;max-width:90vw}
}
</style>
</head>
<body>

<!-- Toast -->
<div id="toast"></div>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>Scrinium</h1>
    <p>RAG-чат по вашим документам</p>
    <div>
      <div class="form-group">
        <input type="text" id="login-user" placeholder="Пользователь" autocomplete="username">
      </div>
      <div class="form-group">
        <input type="password" id="login-pass" placeholder="Пароль" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="login()">Войти</button>
      <div class="login-error" id="login-error">Неверный логин или пароль</div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>Scrinium</h2>
      <span class="user-badge" id="user-badge">admin</span>
    </div>

    <div class="sidebar-section">
      <span>Документы</span>
      <button onclick="toggleUpload()">+</button>
    </div>
    <div class="sidebar-list" id="doc-list"></div>

    <div class="sidebar-section">
      <span>Чаты</span>
      <button onclick="newChat()">+</button>
    </div>
    <div class="sidebar-list" id="chat-list"></div>

    <div style="padding:12px;border-top:1px solid var(--surface2);display:flex;gap:8px">
      <button class="btn-secondary" style="flex:1;font-size:12px" onclick="toggleSettings()">⚙️ Настройки</button>
      <button class="btn-danger" style="flex:0;font-size:12px;padding:6px 12px" onclick="logout()">Выйти</button>
    </div>
  </div>

  <!-- Overlay for mobile sidebar -->
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Main -->
  <div id="main">
    <div id="chat-header">
      <div style="display:flex;align-items:center;gap:8px">
        <button id="menu-btn" onclick="toggleSidebar()">☰</button>
        <span class="title" id="chat-title">Новый чат</span>
      </div>
      <div class="actions">
        <button onclick="toggleUpload()">📄 Загрузить</button>
        <button onclick="newChat()">✏️ Новый чат</button>
      </div>
    </div>

    <!-- Upload -->
    <div id="upload-area">
      <div class="upload-zone" id="upload-zone"
        ondragover="event.preventDefault();this.classList.add('dragover')"
        ondragleave="this.classList.remove('dragover')"
        ondrop="event.preventDefault();this.classList.remove('dragover');handleDrop(event)"
        onclick="document.getElementById('file-input').click()">
        <div class="icon">📄</div>
        <div class="text">Перетащите файл сюда или нажмите для выбора</div>
        <div class="hint">PDF, TXT, MD, HTML, EPUB, DOCX и другие</div>
        <input type="file" id="file-input" style="display:none;"
          accept=".pdf,.txt,.md,.html,.htm,.json,.csv,.xml,.yaml,.yml,.rst,.rtf,.epub,.docx,.xlsx,.pptx"
          onchange="handleFile(this.files[0])">
      </div>
      <div class="upload-progress" id="upload-progress">
        <div class="file" id="upload-filename"></div>
        <div class="bar"><div id="upload-bar"></div></div>
        <div class="status" id="upload-status"></div>
      </div>
    </div>

    <!-- Settings -->
    <div id="settings-panel">
      <h3>Настройки LLM</h3>
      <div class="settings-row">
        <label>Base URL</label>
        <input id="set-base-url" placeholder="https://api.openai.com/v1">
      </div>
      <div class="settings-row">
        <label>Model</label>
        <input id="set-model" placeholder="gpt-4o-mini">
      </div>
      <div class="settings-row">
        <label>API Key</label>
        <input id="set-api-key" type="password" placeholder="sk-...">
      </div>
      <div class="settings-row">
        <label>Пользователь</label>
        <input id="set-password" type="password" placeholder="Новый пароль (оставьте пустым)">
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages">
      <div class="empty-state">
        <div class="emoji">📚</div>
        <p>Загрузите документ и задайте вопрос</p>
        <div class="sub">Scrinium найдёт ответ в ваших файлах</div>
      </div>
    </div>

    <!-- Input -->
    <div id="chat-input-area">
      <form id="chat-form" onsubmit="return sendMessage(event)">
        <textarea id="chat-input" rows="1" placeholder="Задайте вопрос по документам..." autocomplete="off"></textarea>
        <button id="chat-send" type="submit">➤</button>
      </form>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────
let TOKEN = localStorage.getItem('scrinium_token') || '';
let USER = '';
let CURRENT_SESSION = null;
let UPLOADING = false;

// ── Toast ────────────────────────────────────────────────
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// ── Auth ────────────────────────────────────────────────
async function login() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/login', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:u, password:p})
    });
    if(!r.ok) throw Error();
    const d = await r.json();
    TOKEN = d.token;
    USER = d.username;
    localStorage.setItem('scrinium_token', TOKEN);
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-badge').textContent = USER;
    loadDocuments();
    loadSessions();
    loadSettings();
  } catch(e) {
    err.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('scrinium_token');
  TOKEN = '';
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

// Check auth on load
(async function() {
  if(TOKEN) {
    try {
      const r = await fetch('/api/me', {headers:{'Authorization':`Bearer ${TOKEN}`}});
      if(!r.ok) throw Error();
      const d = await r.json();
      USER = d.username;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('user-badge').textContent = USER;
      loadDocuments();
      loadSessions();
      loadSettings();
    } catch(e) {
      localStorage.removeItem('scrinium_token');
    }
  }
})();

// Enter to login
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

// ── Sidebar ──────────��───────────────────────────────────
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebar-overlay');
  s.classList.toggle('open');
  o.classList.toggle('visible');
}

// ── Documents ────────────────────────────────────────────
async function loadDocuments() {
  const el = document.getElementById('doc-list');
  try {
    const r = await fetch('/api/documents', {headers:{'Authorization':`Bearer ${TOKEN}`}});
    const docs = await r.json();
    el.innerHTML = docs.map(d => `
      <div class="sidebar-item" onclick="toggleUpload()">
        <div class="icon doc">📄</div>
        <div class="info">
          <div class="title">${d.filename}</div>
          <div class="sub">${d.chunks} чанков · ${d.pages} стр.</div>
        </div>
        <button class="del" onclick="event.stopPropagation();deleteDoc('${d.doc_id}')">✕</button>
      </div>
    `).join('');
  } catch(e) { /* ignore */ }
}

async function deleteDoc(docId) {
  if(!confirm('Удалить документ?')) return;
  try {
    await fetch(`/api/documents/${docId}`, {
      method:'DELETE',
      headers:{'Authorization':`Bearer ${TOKEN}`}
    });
    loadDocuments();
    toast('Документ удалён', 'success');
  } catch(e) { toast('Ошибка удаления', 'error'); }
}

// ── Upload ───────────────────────────────────────────────
function toggleUpload() {
  const a = document.getElementById('upload-area');
  a.classList.toggle('visible');
}

function handleDrop(e) {
  const file = e.dataTransfer.files[0];
  if(file) handleFile(file);
}

async function handleFile(file) {
  console.log('handleFile called', file?.name, file?.size);
  if(!file || UPLOADING) return;
  UPLOADING = true;
  document.getElementById('upload-area').classList.add('visible');
  const prog = document.getElementById('upload-progress');
  prog.classList.add('visible');
  document.getElementById('upload-filename').textContent = file.name;
  document.getElementById('upload-bar').style.width = '10%';
  document.getElementById('upload-status').textContent = '⏳ Загружаю...';

  const form = new FormData();
  form.append('file', file);

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000); // 2 min

    const r = await fetch('/api/upload', {
      method:'POST',
      headers:{'Authorization':`Bearer ${TOKEN}`},
      body: form,
      signal: controller.signal
    });
    clearTimeout(timeout);
    document.getElementById('upload-bar').style.width = '100%';
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail);
    console.log('Upload OK:', d);
    document.getElementById('upload-status').textContent = `✅ ${d.chunks} чанков проиндексировано`;
    setTimeout(() => { prog.classList.remove('visible'); }, 2000);
    loadDocuments();
    toast(`Загружен: ${d.filename} (${d.chunks} чанков)`, 'success');
  } catch(e) {
    console.error('Upload error:', e);
    document.getElementById('upload-bar').style.width = '0%';
    const msg = e.name === 'AbortError'
      ? '❌ Сервер не ответил за 2 минуты. Файл слишком большой или повреждён.'
      : `❌ ${e.message || 'Ошибка загрузки'}`;
    document.getElementById('upload-status').textContent = msg;
    toast(msg, 'error');
  }
  UPLOADING = false;
}

async function loadSettings() {
  try {
    const r = await fetch('/api/llm/settings', {headers:{'Authorization':`Bearer ${TOKEN}`}});
    const d = await r.json();
    document.getElementById('set-base-url').value = d.base_url || '';
    document.getElementById('set-model').value = d.model || '';
    document.getElementById('set-api-key').value = d.api_key || '';
  } catch(e) { /* ignore */ }
}

function toggleSettings() {
  const p = document.getElementById('settings-panel');
  p.classList.toggle('visible');
}

// ── Chat Sessions ────────────────────────────────────────
async function loadSessions() {
  const el = document.getElementById('chat-list');
  try {
    const r = await fetch('/api/chat/sessions', {headers:{'Authorization':`Bearer ${TOKEN}`}});
    const sessions = await r.json();
    el.innerHTML = sessions.map(s => `
      <div class="sidebar-item${s.id===CURRENT_SESSION?' active':''}" onclick="switchSession('${s.id}')">
        <div class="icon chat">💬</div>
        <div class="info">
          <div class="title">${escapeHtml(s.title)}</div>
          <div class="sub">${new Date(s.created_at).toLocaleDateString()}</div>
        </div>
        <button class="del" onclick="event.stopPropagation();deleteSession('${s.id}')">✕</button>
      </div>
    `).join('');
  } catch(e) { /* ignore */ }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

async function newChat() {
  CURRENT_SESSION = null;
  document.getElementById('chat-title').textContent = 'Новый чат';
  document.getElementById('chat-messages').innerHTML = `
    <div class="empty-state">
      <div class="emoji">📚</div>
      <p>Загрузите документ и задайте вопрос</p>
      <div class="sub">Scrinium найдёт ответ в ваших файлах</div>
    </div>
  `;
  document.querySelectorAll('.sidebar-item.active').forEach(el => el.classList.remove('active'));
}

async function switchSession(id) {
  CURRENT_SESSION = id;
  document.querySelectorAll('.sidebar-item.active').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.sidebar-item[onclick*="${id}"]`);
  if(el) el.classList.add('active');
  document.getElementById('sidebar').classList.remove('open');

  try {
    const r = await fetch(`/api/chat/sessions/${id}`, {headers:{'Authorization':`Bearer ${TOKEN}`}});
    const msgs = await r.json();
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('chat-title').textContent = msgs.length ? msgs[0].content.slice(0,60) : 'Чат';
    msgs.forEach(m => addMessage(m.role, m.content, m.sources));
    scrollToBottom();
  } catch(e) { /* ignore */ }
}

async function deleteSession(id) {
  if(!confirm('Удалить чат?')) return;
  try {
    await fetch(`/api/chat/sessions/${id}`, {
      method:'DELETE',
      headers:{'Authorization':`Bearer ${TOKEN}`}
    });
    if(CURRENT_SESSION===id) newChat();
    loadSessions();
    toast('Чат удалён', 'success');
  } catch(e) { toast('Ошибка', 'error'); }
}

// ── Chat ────────────────────────────────────────────────
function addMessage(role, content, sources) {
  const el = document.getElementById('chat-messages');
  const empty = el.querySelector('.empty-state');
  if(empty) empty.remove();

  const div = document.createElement('div');
  div.className = `message ${role}`;
  let html = `<div class="bubble">`;
  if(role==='assistant') html += `<div class="label">Scrinium</div>`;
  html += `<div>${markdownToHtml(content)}</div>`;
  if(sources && sources.length) {
    html += `<div class="sources">${sources.map(s => {
      const name = s.filename || s.split('#')[0];
      return `<span class="tag">📄 ${escapeHtml(name)}</span>`;
    }).join('')}</div>`;
  }
  html += '</div>';
  div.innerHTML = html;
  el.appendChild(div);
  scrollToBottom();
}

function markdownToHtml(text) {
  if(!text) return '';
  let h = escapeHtml(text);
  h = h.replace(/\n/g, '<br>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/`(.+?)`/g, '<code>$1</code>');
  return h;
}

function scrollToBottom() {
  const el = document.getElementById('chat-messages');
  requestAnimationFrame(() => el.scrollTop = el.scrollHeight);
}

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Ctrl+Enter send
document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if(e.key==='Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('chat-form').dispatchEvent(new Event('submit'));
  }
});

async function sendMessage(e) {
  e.preventDefault();
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if(!msg) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('chat-send').disabled = true;
  addMessage('user', msg);

  try {
    const r = await fetch('/api/chat', {
      method:'POST',
      headers:{'Authorization':`Bearer ${TOKEN}`, 'Content-Type':'application/json'},
      body:JSON.stringify({message: msg, session_id: CURRENT_SESSION})
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.detail);
    CURRENT_SESSION = d.session_id;
    addMessage('assistant', d.answer, d.sources);
    loadSessions();
    document.getElementById('chat-title').textContent = msg.slice(0,60);
  } catch(e) {
    addMessage('assistant', `❌ ${e.message}`, []);
    toast(e.message, 'error');
  }
  document.getElementById('chat-send').disabled = false;
}

// Enter to login — on page load focus input
document.addEventListener('DOMContentLoaded', () => {
  if(!TOKEN) document.getElementById('login-user').focus();
});
</script>
